[package]
name = "argument-comment-lint"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[[bin]]
name = "argument-comment-lint"
path = "src/bin/argument-comment-lint.rs"

[dependencies]
dylint_linting = "4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
anyhow = "1"
