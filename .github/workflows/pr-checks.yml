name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Rust formatting — Linux only (OS-independent output)
  # ---------------------------------------------------------------------------
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  # ---------------------------------------------------------------------------
  # Dependency auditing — unused / incorrect deps
  # ---------------------------------------------------------------------------
  shear:
    name: cargo shear
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-shear
        run: cargo install cargo-shear
      - uses: swatinem/rust-cache@v2
      - run: cargo shear --workspace

  # ---------------------------------------------------------------------------
  # Argument comment lint — cross-platform
  # ---------------------------------------------------------------------------
  arg-lint:
    name: Argument comment lint (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustc-dev, llvm-tools
      - name: Install cargo-dylint
        run: cargo install cargo-dylint
      - name: Build lint library
        run: cargo build --release --lib
        working-directory: tools/argument-comment-lint
      - name: Run linter
        run: cargo run --bin argument-comment-lint -- --check
        working-directory: tools/argument-comment-lint

  # ---------------------------------------------------------------------------
  # Clippy — fast single-target on all three Tier-1 platforms
  # ---------------------------------------------------------------------------
  clippy:
    name: Clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # Bazel test — hermetic cross-platform build
  # ---------------------------------------------------------------------------
  bazel:
    name: Bazel (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'Cargo.lock') }}
          restore-keys: bazel-${{ runner.os }}-
      - name: Test
        run: bazel test //... --test_output=errors

  # ---------------------------------------------------------------------------
  # Python checks
  # ---------------------------------------------------------------------------
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest
