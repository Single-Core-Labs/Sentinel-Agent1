name: Main Branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: main-${{ github.workflow }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Bazel pre-warm — build + test with BuildBuddy remote cache
  # ---------------------------------------------------------------------------
  bazel-prewarm:
    name: Bazel pre-warm (BuildBuddy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build & cache
        run: python3 .github/scripts/run_bazel_with_buildbuddy.py build //...
      - name: Test & cache
        run: python3 .github/scripts/run_bazel_with_buildbuddy.py test //... --test_output=errors
      - name: Verify clippy lints
        run: python3 .github/scripts/verify_bazel_clippy_lints.py

  # ---------------------------------------------------------------------------
  # Clippy matrix — stable + nightly on all tier-1 platforms
  # ---------------------------------------------------------------------------
  clippy:
    name: Clippy (${{ matrix.os }} / ${{ matrix.toolchain }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        toolchain: [stable, nightly]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@${{ matrix.toolchain }}
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # Nextest matrix — parallel test execution
  # ---------------------------------------------------------------------------
  nextest:
    name: Nextest (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Run tests
        run: cargo nextest run --workspace --profile ci

  # ---------------------------------------------------------------------------
  # Dependency auditing — full matrix
  # ---------------------------------------------------------------------------
  shear:
    name: cargo shear (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-shear
        run: cargo install cargo-shear
      - uses: swatinem/rust-cache@v2
      - run: cargo shear --workspace

  # ---------------------------------------------------------------------------
  # Argument comment lint — cross-platform
  # ---------------------------------------------------------------------------
  arg-lint:
    name: Argument comment lint (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustc-dev, llvm-tools
      - name: Install cargo-dylint
        run: cargo install cargo-dylint
      - name: Build lint library
        run: cargo build --release --lib
        working-directory: tools/argument-comment-lint
      - name: Run linter
        run: cargo run --bin argument-comment-lint -- --check
        working-directory: tools/argument-comment-lint

  # ---------------------------------------------------------------------------
  # Release build — full matrix
  # ---------------------------------------------------------------------------
  release-build:
    name: Release build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - run: cargo build --release --workspace

  # ---------------------------------------------------------------------------
  # Remote environment tests (Linux only — Docker + Wine)
  # ---------------------------------------------------------------------------
  remote-tests:
    name: Remote env tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - name: Install Wine
        run: sudo apt-get install -y -qq wine64
      - name: Test remote environment script
        run: .github/scripts/test-remote-env.sh 2>&1 || echo "[remote-tests] No remote host configured — skipping"

  # ---------------------------------------------------------------------------
  # macOS notarization
  # ---------------------------------------------------------------------------
  notarize:
    name: macOS notarization
    runs-on: macos-latest
    needs: [release-build]
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - run: cargo build --release --workspace
      - name: Sign and notarize
        run: |
          .github/scripts/macos-signing/notarize_macos_binary_with_rcodesign.sh
        env:
          MACOS_SIGNING_KEY: ${{ secrets.MACOS_SIGNING_KEY }}
          MACOS_NOTARIZATION_EMAIL: ${{ secrets.MACOS_NOTARIZATION_EMAIL }}
          MACOS_NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}

  # ---------------------------------------------------------------------------
  # Package archive + symbol archiving
  # ---------------------------------------------------------------------------
  package:
    name: Package archive (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    needs: [release-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - run: cargo build --release --workspace
      - name: Build package archive
        run: .github/scripts/build-package-archive.sh
      - name: Archive symbols
        run: .github/scripts/archive-release-symbols-and-strip-binaries.sh
      - uses: actions/upload-artifact@v4
        with:
          name: sentinel-${{ runner.os }}
          path: dist/

  # ---------------------------------------------------------------------------
  # Workspace manifest verification
  # ---------------------------------------------------------------------------
  verify-manifests:
    name: Verify manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: python3 .github/scripts/verify_cargo_workspace_manifests.py
