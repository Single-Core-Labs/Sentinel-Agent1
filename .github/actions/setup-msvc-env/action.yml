name: Setup MSVC environment
description: Install Visual Studio Build Tools and configure MSVC environment for Windows CI.
runs:
  using: composite
  steps:
    - name: Setup MSVC
      shell: pwsh
      run: .github/actions/setup-msvc-env/setup-msvc-env.ps1
    - name: Verify MSVC
      shell: pwsh
      run: cl.exe /? 2>$null; if ($LASTEXITCODE -ne 0) { throw "MSVC not found" }
