receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  # Normalise metric names to Prometheus convention
  transform/metrics:
    metric_statements:
      # Drop high-cardinality attributes from metric points
      - context: metric
        statements:
          - set(description, "") where name == "agent.llm.call.duration"
          - set(description, "") where name == "agent.tool.call.duration"

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: agent
    send_timestamps: true
    metric_expiration: 5m
    resource_to_telemetry_conversion:
      enabled: true

  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  logging:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo, logging]

    metrics:
      receivers: [otlp]
      processors: [batch, transform/metrics]
      exporters: [prometheus, logging]
